<!doctype html>
<html>
    <head><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
        <title>Add to Cart</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap" rel="stylesheet">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="manifest" href="/site.webmanifest">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <section id="logged-out-view">
            <div class="container">
                <h1 class="app-title">Please Log In or Create New Account</h1>                          
                <div class="auth-fields-and-buttons">
                    <button id="sign-in-with-google-btn" class="provider-btn">
                        <img class="google-logo" src="assets/google-logo.png" class="google-btn-logo">
                        Sign in with Google
                    </button>
                    <input id="email-input" type="email" placeholder="Email">
                    <input id="password-input" type="password" placeholder="Password">
                    
                    <button id="sign-in-btn" class="primary-btn">Sign in</button>
                    <button id="create-account-btn" class="secondary-btn">Create Account</button>
                </div>
            </div>
        </section>
        
        <section id="logged-in-view">           
            <div class="container">
                <nav calss="nav-container">
                    <button id="sign-out-btn" class="icon-btn">
                            <img class="exit-icon" src="assets/icon-sign-out.png" class="icon-img-btn">                        
                    </button>
                </nav>
                <img class="reminder-image" src="assets/list_icon/icon2.png">
                <input type="text" id="input-field" placeholder="... note ...">
                <button id="add-button">Add to cart</button>
                <ul id="shopping-list">
                </ul>
            </div>
        </section>
        
        <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore-compat.js"></script>
        <script src="index.js" type="module"></script>
        
    </body>
</html>
